[github]
token = ""
owner = ""
repo = ""
per_page = 25

[[tickets.providers]]
type = "jira"
enabled = true
base_url = ""
email = ""
api_token = ""
key_patterns = ["[A-Z]{2,10}-\\d+"]

[[tickets.providers]]
type = "linear"
enabled = false
api_key = ""
key_patterns = ["[a-z]+-[0-9]+"]

[llm]
# LLM backend — pick one:
#   "claude-cli"  Claude Code CLI (no API key needed, uses `claude --print`)
#   "anthropic"   Anthropic Messages API  → set ANTHROPIC_API_KEY
#   "openai"      OpenAI Chat Completions → set OPENAI_API_KEY
#   "gemini"      Google Gemini API       → set GEMINI_API_KEY or GOOGLE_API_KEY
#   "ollama"      Local Ollama server     → no key needed (default: localhost:11434)
# provider = "claude-cli"
# provider = "gemini"
provider = "ollama"

# Model name for the selected provider, e.g.:
#   anthropic : "claude-opus-4-6" | "claude-sonnet-4-6" | "claude-haiku-4-5"
#   openai    : "gpt-4o" | "gpt-4-turbo" | "o3"
#   gemini    : "gemini-1.5-pro" | "gemini-1.5-flash" | "gemini-2.0-flash" | "gemini-flash-latest"
# ollama    : "llama3.2" | "codellama" | "deepseek-coder"
# model = "claude-opus-4-6"
# model    = "gemini-flash-latest"
model = "qwen2.5-coder:14b"

#
max_tokens = 8192
temperature = 0.2
# api_key = ""     # overrides env var; leave empty to use ANTHROPIC_API_KEY etc.
# base_url = ""    # custom endpoint (Azure OpenAI, custom Ollama host, etc.)
# ollama_num_ctx = 16384  # Ollama context window (tokens). Set this if you see
#                         # "truncating input prompt" in the Ollama server log.
#                         # Must be <= the model's n_ctx_train (shown in Ollama logs).
#                         # Recommended for qwen2.5-coder:14b: 16384 or 32768.
ollama_num_ctx = 16384

[agents]
agents_dir = "~/.config/prism/agents"
concurrency = 1
timeout_secs = 600

# Files matching these glob patterns are excluded from every agent's diff.
# Patterns are matched against the full path and every sub-path (so "dist/*"
# also matches "frontend/dist/bundle.js"). Supports '*' wildcard only.
# Per-agent exclude_patterns in the agent TOML are merged on top of this list.
diff_exclude_patterns = [
  "*.lock",
  "package-lock.json",
  "yarn.lock",
  "pnpm-lock.yaml",
  "*.generated.*",
  "*.min.js",
  "*.min.css",
  "dist/*",
  "build/*",
  "vendor/*",
  "node_modules/*",
  "__generated__/*",
  "*.pb.go",
  "*.pb.ts",
  "*.snap",
]

# Maximum diff tokens per agent. Files are truncated at clean file boundaries
# (never mid-hunk). Because the global exclude patterns remove noise files first,
# the effective diff seen by the LLM is typically much smaller.
max_diff_tokens = 12000

# Review rigor level — controls how selective agents are when generating comments.
#
# Each level gives the LLM a concrete per-comment decision rule AND post-filters
# the output as a safety net (in case the model ignores the instruction).
#
#   "critical_only"  — Security vulnerabilities, crashes, data loss, and build
#                      failures ONLY. All other comments are dropped.
#                      Post-filter: keeps only severity = "critical"
#
#   "strict"         — All of the above + significant architectural flaws,
#                      missing error handling for realistic failure cases, critical
#                      test gaps, and serious performance issues (N+1, memory leak).
#                      Post-filter: keeps severity = "warning" and "critical"
#
#   "moderate"       — Balanced review (default). All genuine issues including
#                      style, naming, and test suggestions.
#                      Post-filter: none (all comments kept)
#
#   "light"          — Encouraging mode. Flags real problems, praises good patterns,
#                      avoids nitpicking. Good for WIP or draft PRs.
#                      Post-filter: none (all comments kept)
#
# Per-agent override: add  min_severity: "warning"  to any agent's .md frontmatter
# to pin that agent's minimum severity regardless of this global setting.
# Example: set security agent to always keep "suggestion" even in strict mode.
review_rigor = "moderate"

[ui]
theme = "dark"
diff_context_lines = 5
show_line_numbers = true
highlight_syntax = true

[ui.keybindings]
quit = "q"
back = "Esc"
confirm = "Enter"
next_pane = "Tab"
prev_pane = "Shift+Tab"
generate_review = "r"
manual_comment = "c"
publish = "p"
toggle_item = "Space"
select_all = "A"
deselect_all = "D"
open_browser = "o"
refresh = "F5"
search = "/"
agent_config = "a"
settings = "S"
preview_summary = "P"
check_file = "x"

[publishing]
confirm_before_publish = true
auto_translate_to_english = false
auto_correct_grammar = false

[publishing.format]
body_template = "## Code Review\n\n{comment_count} comment(s) for PR #{pr_number}.\n\n{comments_list}"
comment_template = "- **`{file}:{line}`** [{severity}] {body}"

[editor]
# command used for external editing (key 'e')
command = "nvim"
# use internal vim-like mode for text areas
internal_vim = true
