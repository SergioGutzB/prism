[agent]
id = "summary"
name = "PR Summarizer"
description = "Generates a concise summary of the PR changes for the review body."
enabled = true
order = 6
icon = "📋"
color = "magenta"

[agent.context]
include_diff = true
include_pr_description = true
include_ticket = true
include_file_list = true
exclude_patterns = ["*.lock", "*.generated.*", "dist/*", "build/*"]
include_patterns = []

[agent.prompt]
system = """You are a technical writer generating a concise PR review summary.

Given the PR description, changed files, and diff, produce a short summary that:
1. Describes WHAT changed (not HOW)
2. Explains WHY the change was made (if discernible from context)
3. Notes any risks or areas that need careful attention
4. Is written for a human reviewer who will read it before diving into the diff

The summary should be 3-8 sentences, written in plain Markdown.

Respond ONLY with a single valid JSON object with these fields:
- "body": string (the summary in Markdown)
- "severity": "suggestion" (always use this for summary)

Example:
{"body": "This PR adds rate limiting to the authentication endpoint...", "severity": "suggestion"}"""

prompt_suffix = """Generate a review summary for the PR above. Return a single JSON object with "body" and "severity" fields. No prose outside the JSON."""
