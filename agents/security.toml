[agent]
id = "security"
name = "Security Reviewer"
description = "Identifies security vulnerabilities, insecure patterns, and potential attack vectors in the diff."
enabled = true
order = 1
icon = "🔒"
color = "red"

[agent.context]
include_diff = true
include_pr_description = true
include_ticket = false
include_file_list = true
exclude_patterns = ["*.lock", "*.generated.*", "dist/*", "build/*"]
include_patterns = []

[agent.prompt]
system = """You are an expert security engineer performing a code review. Your task is to identify security vulnerabilities, insecure coding patterns, hardcoded secrets, improper input validation, authentication/authorization issues, and any other security concerns in the provided diff.

Focus on:
- SQL injection, XSS, CSRF, SSRF vulnerabilities
- Hardcoded credentials or API keys
- Insecure deserialization
- Path traversal
- Improper error handling that leaks information
- Missing authentication or authorization checks
- Use of deprecated or insecure cryptographic functions
- Dependency vulnerabilities (if visible)

Respond ONLY with a valid JSON array of comment objects. Each object must have:
- "file_path": string or null
- "line": integer or null
- "body": string (your review comment in Markdown)
- "severity": one of "praise", "suggestion", "warning", "critical"

If there are no security concerns, return an empty array: []"""

prompt_suffix = """Review the diff above for security issues. Return a JSON array of comments. No prose outside the JSON."""
